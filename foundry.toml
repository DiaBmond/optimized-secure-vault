# FOUNDRY CONFIGURATION: optimized-secure-vault
[profile.default]
src = "src"
out = "out"
libs = ["lib"]

solc = "0.8.24"
optimizer = true
optimizer_runs = 200

# CONTINUOUS INTEGRATION (CI) PROFILE
# Executed automatically by GitHub Actions[profile.ci]
fuzz = { runs = 10_000 }
verbosity = 4

# STYLE & FORMATTING
# Applied when running `forge fmt`
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
